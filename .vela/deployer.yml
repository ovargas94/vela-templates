metadata:
  template: true

steps:
  # docker publish step this step should generate the docker image and publish to registry

  - name: docker-build-push-{{ .deployment_target }}
    image: alpine:latest
    ruleset:
      if:
        {{ if eq .deployment_target "dev" }}
          event: [push]
          branch: [main]
        {{else}}
          event: [deployment]
          branch: [main]
        {{end}}
    commands:
      - echo "== DOCKER BUILD & PUSH =="
      - echo "Environment  {{ .deployment_target }}"
      - echo "Image tag    {{ .deployment_target }}-${VELA_BUILD_COMMIT:0:8}"
      - echo "Registry     451937841924.dkr.ecr.us-east-2.amazonaws.com"
      - echo "Repo         crm-platform-server"
      - echo "Build arg    APP_ENV={{ .deployment_target }}"
      - echo "== PUSHED TO ECR (simulated) =="

  # this step should be executing the deployment step
  - name: deploy_step-{{ .deployment_target }}
    image: alpine:latest
    ruleset:
      if:
        {{ if eq .deployment_target "dev" }}
          event: [push]
          branch: [main]
        {{else}}
          event: [deployment]
          branch: [main]
        {{end}}
    commands:
      - echo "== GITOPS DEPLOY {{ .deployment_target | upper }} =="
      - echo "Cloning spartan-git/k8s_apps..."
      - echo "Updating overlays/{{ .deployment_target }}/kustomization.yaml"
      - echo "  image -> crm-platform-server:{{ .deployment_target }}-${VELA_BUILD_COMMIT:0:8}"
      - echo "Commit  chore({{ .deployment_target }}) deploy crm-platform-server@${VELA_BUILD_COMMIT:0:8}"
      - echo "Author  vela-bot@spartancapital.us"
      - echo "Pushing to k8s_apps repo..."
      - echo "== {{ .deployment_target | upper }} DEPLOY COMPLETE =="
